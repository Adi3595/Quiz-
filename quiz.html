<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>QUIZ++ | Knowledge Challenge</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #040404;
      color: #eef2ff;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* Premium animated gradient background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 30% 20%, #1F1F1F 0%, #040404 90%);
      z-index: -2;
    }

    body::after {
      content: '';
      position: fixed;
      top: -15%;
      left: -5%;
      width: 70%;
      height: 70%;
      background: radial-gradient(circle, rgba(0, 200, 150, 0.12), transparent 75%);
      filter: blur(90px);
      z-index: -1;
      animation: auraFloat 14s infinite alternate ease-in-out;
    }

    @keyframes auraFloat {
      0% { opacity: 0.3; transform: translate(0, 0) scale(1); }
      100% { opacity: 0.8; transform: translate(8%, 6%) scale(1.25); }
    }

    /* Floating particles background */
    .particle-field {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #00C896;
      border-radius: 50%;
      opacity: 0.3;
      animation: floatParticle 18s infinite linear;
    }

    @keyframes floatParticle {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      15% { opacity: 0.6; }
      85% { opacity: 0.4; }
      100% { transform: translateY(-20vh) scale(0.8); opacity: 0; }
    }

    /* Cursor glow effect */
    .cursor-glow {
      position: fixed;
      width: 380px;
      height: 380px;
      background: radial-gradient(circle, rgba(0, 200, 150, 0.15), transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.08s linear;
      filter: blur(45px);
      will-change: transform;
    }

    .container {
      width: 90%;
      max-width: 900px;
      margin: auto;
      padding: 2rem 1rem;
      opacity: 0;
      transform: translateY(30px);
      animation: containerEnter 0.8s ease-out 0.3s forwards;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 10;
    }

    @keyframes containerEnter {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h2 {
      text-align: center;
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ffffff, #00C896, #a0f0e0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
      position: relative;
    }

    h2::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00C896, #00ffcc, transparent);
      border-radius: 2px;
    }

    .subtopic-info {
      text-align: center;
      color: #a0b3c9;
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      font-style: italic;
      background: rgba(0, 200, 150, 0.08);
      padding: 0.5rem 1.2rem;
      border-radius: 3rem;
      display: inline-block;
    }

    /* TIMER STYLES - Premium */
    .timer-container {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      background: rgba(18, 18, 22, 0.85);
      backdrop-filter: blur(16px);
      padding: 0.8rem 1.5rem;
      border-radius: 3rem;
      font-weight: 700;
      font-size: 1.2rem;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(0, 200, 150, 0.4);
      z-index: 1000;
      transition: all 0.3s ease;
      font-family: 'JetBrains Mono', monospace;
    }

    .timer-container.warning {
      border-color: #f59e0b;
      box-shadow: 0 0 20px rgba(245, 158, 11, 0.3);
      animation: timerPulse 1s infinite;
    }

    .timer-container.critical {
      border-color: #ef4444;
      box-shadow: 0 0 20px rgba(239, 68, 68, 0.4);
      animation: timerPulse 0.5s infinite;
    }

    .timer-container.no-timer {
      display: none;
    }

    @keyframes timerPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.03); }
    }

    /* TIME'S UP OVERLAY STYLES */
    .timeup-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(4, 4, 4, 0.95);
      backdrop-filter: blur(16px);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
      animation: fadeIn 0.5s ease-out;
    }

    .countdown-content {
      text-align: center;
      color: white;
    }

    .countdown-icon {
      font-size: 5rem;
      margin-bottom: 1.5rem;
      animation: bounce 1s infinite;
    }

    .countdown-title {
      font-size: 3rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #ef4444, #f59e0b);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .countdown-subtitle {
      font-size: 1.2rem;
      margin-bottom: 2rem;
      opacity: 0.8;
    }

    .countdown-number {
      font-size: 5rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ef4444, #f59e0b);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: countdownPop 1s ease-out;
    }

    .redirect-message {
      font-size: 0.9rem;
      margin-top: 1.5rem;
      opacity: 0.7;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes countdownPop {
      0% { transform: scale(0); opacity: 0; }
      70% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Question Box */
    .question-box {
      background: rgba(18, 18, 22, 0.75);
      backdrop-filter: blur(20px);
      padding: 2rem;
      border-radius: 2rem;
      margin-top: 1.5rem;
      border: 1px solid rgba(0, 200, 150, 0.25);
      box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.5);
      position: relative;
      width: 100%;
      opacity: 0;
      transform: scale(0.98);
      animation: questionSlideIn 0.6s ease-out 0.6s forwards;
    }

    @keyframes questionSlideIn {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .question-box::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #00C896, #00ffcc, #00C896, transparent);
      border-radius: 2rem 2rem 0 0;
      animation: neonFlow 3s ease-in-out infinite;
    }

    @keyframes neonFlow {
      0% { opacity: 0.4; background-position: -100% 0; }
      50% { opacity: 1; background-position: 100% 0; }
      100% { opacity: 0.4; background-position: 200% 0; }
    }

    .question-text {
      font-size: 1.2rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
      font-weight: 500;
      text-align: center;
    }

    .options-container {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    button.option {
      display: flex;
      align-items: flex-start;
      width: 100%;
      text-align: left;
      padding: 1rem 1rem 1rem 3.5rem;
      border: 1.5px solid rgba(0, 200, 150, 0.25);
      border-radius: 3rem;
      background: rgba(30, 30, 38, 0.6);
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      color: #eef2ff;
      font-size: 0.95rem;
      line-height: 1.5;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      position: relative;
      overflow: hidden;
    }

    button.option::before {
      content: attr(data-letter);
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      width: 30px;
      height: 30px;
      background: rgba(0, 200, 150, 0.15);
      border: 1.5px solid #00C896;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
      transition: all 0.3s ease;
    }

    button.option:hover {
      background: rgba(0, 200, 150, 0.1);
      border-color: #00C896;
      transform: translateY(-2px);
    }

    button.option:hover::before {
      background: #00C896;
      transform: translateY(-50%) scale(1.1);
    }

    button.option.selected {
      background: rgba(0, 200, 150, 0.2);
      border-color: #00C896;
    }

    button.option.selected::before {
      background: #00C896;
      transform: translateY(-50%) scale(1.1);
    }

    .option-content {
      flex: 1;
      overflow-wrap: break-word;
    }

    .option-content pre {
      background: rgba(4, 4, 4, 0.6);
      padding: 0.8rem;
      border-radius: 1rem;
      overflow-x: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      margin: 0.5rem 0;
      border: 0.5px solid rgba(0, 200, 150, 0.2);
    }

    button.next {
      margin-top: 2rem;
      background: linear-gradient(105deg, #1F1F1F, #0a0a0a);
      border: 1px solid rgba(0, 200, 150, 0.55);
      border-radius: 3rem;
      padding: 0.9rem 2.5rem;
      cursor: pointer;
      color: white;
      font-weight: 700;
      font-size: 1rem;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      position: relative;
      overflow: hidden;
      display: block;
      margin-left: auto;
      margin-right: auto;
      opacity: 0;
      animation: fadeInUp 0.5s ease-out 0.8s forwards;
    }

    button.next:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    button.next::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 200, 150, 0.15), transparent);
      transition: left 0.55s ease;
    }

    button.next:hover:not(:disabled) {
      transform: translateY(-2px);
      border-color: #00ffcc;
      box-shadow: 0 8px 20px rgba(0, 200, 150, 0.3);
    }

    button.next:hover:not(:disabled)::before {
      left: 120%;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Loading */
    #loading {
      text-align: center;
      margin-top: 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(0, 200, 150, 0.2);
      border-top: 3px solid #00C896;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 1rem;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Progress bar */
    .progress-bar {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
      margin: 1rem 0;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00C896, #00ffcc);
      border-radius: 2px;
      width: 0%;
      transition: width 0.5s ease-out;
      position: relative;
    }

    .question-counter {
      text-align: center;
      font-size: 0.8rem;
      color: #a0b3c9;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .container { padding: 1rem; }
      h2 { font-size: 1.8rem; }
      .question-box { padding: 1.2rem; }
      button.option { padding: 0.8rem 0.8rem 0.8rem 3rem; font-size: 0.85rem; }
      button.option::before { width: 24px; height: 24px; font-size: 0.7rem; left: 0.8rem; }
      .timer-container { top: 0.8rem; right: 0.8rem; padding: 0.5rem 1rem; font-size: 1rem; }
      .countdown-title { font-size: 2rem; }
      .countdown-number { font-size: 3rem; }
    }
  </style>
</head>
<body>
<div class="cursor-glow" id="cursorGlow"></div>
<div class="particle-field" id="particleField"></div>

<div class="timer-container" id="timer">
  ⏱️ <span id="time">10:00</span>
</div>

<div class="timeup-overlay" id="timeupOverlay">
  <div class="countdown-content">
    <div class="countdown-icon">⏰</div>
    <h1 class="countdown-title">Time's Up!</h1>
    <p class="countdown-subtitle">Taking you to results in...</p>
    <div class="countdown-number" id="countdownNumber">3</div>
    <p class="redirect-message">Your quiz is being submitted...</p>
  </div>
</div>

<div class="container">
  <h2 id="quiz-title">Loading Quiz...</h2>
  <div class="subtopic-info" id="subtopic-info" style="display:none;"></div>
  
  <div id="loading">
    <div class="loading-spinner"></div>
    <p>✨ Generating your cosmic quiz...</p>
  </div>
  
  <div class="question-counter" id="question-counter" style="display:none;"></div>
  <div class="progress-bar" id="progress-bar" style="display:none;">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
  
  <div id="question-box" class="question-box" style="display:none;"></div>
  <button class="next" id="next-btn" style="display:none;" onclick="nextQuestion()" disabled>Next Question 🚀</button>
</div>

<script>
  // Cursor glow effect
  const cursorGlow = document.getElementById('cursorGlow');
  document.addEventListener('mousemove', (e) => {
    cursorGlow.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
  });

  // Generate floating particles
  function createParticles() {
    const container = document.getElementById('particleField');
    if (!container) return;
    for (let i = 0; i < 60; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      const size = Math.random() * 5 + 2;
      particle.style.width = `${size}px`;
      particle.style.height = `${size}px`;
      particle.style.left = `${Math.random() * 100}%`;
      particle.style.animationDuration = `${Math.random() * 20 + 10}s`;
      particle.style.animationDelay = `${Math.random() * 15}s`;
      particle.style.background = `#00C896`;
      particle.style.opacity = Math.random() * 0.5 + 0.2;
      container.appendChild(particle);
    }
  }
  createParticles();

  // HTML escaping helper
  function escapeHtml(unsafe) {
    return unsafe
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  let questions = [];
  let answers = [];
  let current = 0;
  let timer;
  let timeLeft = parseInt(localStorage.getItem('timer_duration')) || 600;
  let timerEnabled = timeLeft > 0;
  let startTime;
  let questionStartTime;
  let timePerQuestion = [];

  function startTimer() {
    startTime = Date.now();
    questionStartTime = Date.now();
    
    if (timerEnabled && timeLeft > 0) {
      timer = setInterval(updateTimer, 1000);
      document.getElementById('timer').classList.remove('no-timer');
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;
      document.getElementById('time').textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    } else {
      document.getElementById('timer').classList.add('no-timer');
    }
  }

  function updateTimer() {
    if (!timerEnabled) return;
    
    const minutes = Math.floor(timeLeft / 60);
    const seconds = timeLeft % 60;
    document.getElementById('time').textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
    
    const timerElement = document.getElementById('timer');
    if (timeLeft <= 60) {
      timerElement.classList.add('critical');
      timerElement.classList.remove('warning');
    } else if (timeLeft <= 180) {
      timerElement.classList.add('warning');
      timerElement.classList.remove('critical');
    }
    
    if (timeLeft <= 0) {
      clearInterval(timer);
      timeUp();
    }
    timeLeft--;
  }

  function timeUp() {
    showCountdownOverlay();
  }

  function showCountdownOverlay() {
    const overlay = document.getElementById('timeupOverlay');
    const countdownNumber = document.getElementById('countdownNumber');
    
    overlay.style.display = 'flex';
    document.body.style.overflow = 'hidden';
    
    let countdown = 3;
    countdownNumber.textContent = countdown;
    
    const countdownInterval = setInterval(() => {
      countdown--;
      if (countdown > 0) {
        countdownNumber.textContent = countdown;
        countdownNumber.style.animation = 'none';
        setTimeout(() => {
          countdownNumber.style.animation = 'countdownPop 1s ease-out';
        }, 10);
      } else {
        clearInterval(countdownInterval);
        countdownNumber.textContent = '0';
        setTimeout(() => {
          submitQuiz();
        }, 500);
      }
    }, 1000);
  }

  function stopTimer() {
    if (timer) clearInterval(timer);
  }

  function recordQuestionTime() {
    if (questionStartTime) {
      const timeSpent = Math.round((Date.now() - questionStartTime) / 1000);
      timePerQuestion[current] = timeSpent;
    }
    questionStartTime = Date.now();
  }

  function updateProgress() {
    const progress = ((current + 1) / questions.length) * 100;
    document.getElementById('progress-fill').style.width = `${progress}%`;
    document.getElementById('question-counter').textContent = `Question ${current + 1} of ${questions.length}`;
  }

  function updateNextButton() {
    const nextBtn = document.getElementById('next-btn');
    const hasAnswer = answers[current] !== undefined;
    
    if (current === questions.length - 1) {
      nextBtn.textContent = hasAnswer ? 'Finish Quiz 🏁' : 'Finish Quiz 🏁';
    } else {
      nextBtn.textContent = hasAnswer ? 'Next Question 🚀' : 'Next Question 🚀';
    }
    nextBtn.disabled = !hasAnswer;
  }

  window.addEventListener('DOMContentLoaded', async () => {
    const topic = localStorage.getItem('topic');
    const subtopics = JSON.parse(localStorage.getItem('subtopics') || '[]');
    const num = localStorage.getItem('num_questions') || 5;
    const username = localStorage.getItem('username') || "Guest";

    document.getElementById('quiz-title').innerHTML = `${escapeHtml(topic)} <span style="font-weight:400;">· quiz</span>`;
    
    if (subtopics.length > 0) {
      const subtopicInfo = document.getElementById('subtopic-info');
      subtopicInfo.style.display = 'inline-block';
      if (subtopics.length === 1) {
        subtopicInfo.textContent = `🎯 ${subtopics[0]}`;
      } else {
        subtopicInfo.textContent = `🎯 ${subtopics.join(' · ')}`;
      }
    }

    try {
      const res = await fetch('/generate_quiz', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ 
          topic: topic, 
          subtopics: subtopics,
          num: parseInt(num), 
          username: username 
        })
      });

      const data = await res.json();

      if (data.quiz) {
        questions = data.quiz;
        timePerQuestion = new Array(questions.length).fill(0);
        
        setTimeout(() => {
          document.getElementById('loading').style.display = 'none';
          document.getElementById('question-box').style.display = 'block';
          document.getElementById('next-btn').style.display = 'block';
          document.getElementById('question-counter').style.display = 'block';
          document.getElementById('progress-bar').style.display = 'block';
          startTimer();
          showQuestion();
        }, 800);
      } else {
        document.getElementById('loading').innerHTML = '<div style="color: #f97316;">❌ Failed to load quiz. Please try again.</div>';
      }
    } catch (error) {
      console.error(error);
      document.getElementById('loading').innerHTML = '<div style="color: #f97316;">⚠️ Error loading quiz. Check your server.</div>';
    }
  });

  function showQuestion() {
    const box = document.getElementById('question-box');
    box.innerHTML = '';
    box.style.opacity = '0';
    box.style.transform = 'translateX(-30px)';

    const q = questions[current];
    if (!q) return;

    let qText = q.question || "No question text found.";

    if (qText.includes("```")) {
      const parts = qText.split("```");
      let formatted = "";
      for (let i = 0; i < parts.length; i++) {
        if (i % 2 === 0) {
          formatted += `<div class="question-text">${escapeHtml(parts[i])}</div>`;
        } else {
          formatted += `<pre>${escapeHtml(parts[i])}</pre>`;
        }
      }
      qText = formatted;
    } else {
      qText = `<div class="question-text">${escapeHtml(qText)}</div>`;
    }

    const optionsContainer = document.createElement('div');
    optionsContainer.className = 'options-container';

    q.options.forEach((opt, index) => {
      const btn = document.createElement('button');
      btn.className = 'option';
      const letter = ['A', 'B', 'C', 'D'][index];
      btn.setAttribute('data-letter', letter);
      btn.style.animationDelay = `${index * 0.1}s`;

      const contentDiv = document.createElement('div');
      contentDiv.className = 'option-content';

      if (opt.includes("```")) {
        const parts = opt.split("```");
        let formatted = "";
        for (let i = 0; i < parts.length; i++) {
          if (i % 2 === 0) {
            formatted += escapeHtml(parts[i]);
          } else {
            formatted += `<pre>${escapeHtml(parts[i])}</pre>`;
          }
        }
        contentDiv.innerHTML = formatted;
      } else {
        contentDiv.textContent = opt;
      }

      btn.appendChild(contentDiv);
      btn.onclick = (event) => selectOption(event, letter);
      optionsContainer.appendChild(btn);
    });

    box.innerHTML = qText;
    box.appendChild(optionsContainer);

    setTimeout(() => {
      box.style.opacity = '1';
      box.style.transform = 'translateX(0)';
    }, 50);

    updateProgress();
    updateNextButton();
    
    if (current > 0) recordQuestionTime();
  }

  function selectOption(event, opt) {
    answers[current] = opt;
    
    document.querySelectorAll('.option').forEach(b => {
      b.classList.remove('selected');
    });
    
    event.currentTarget.classList.add('selected');
    event.currentTarget.style.animation = 'optionSelect 0.3s ease';
    setTimeout(() => {
      event.currentTarget.style.animation = '';
    }, 300);
    
    updateNextButton();
  }

  async function nextQuestion() {
    recordQuestionTime();
    
    const box = document.getElementById('question-box');
    box.style.opacity = '0';
    box.style.transform = 'translateX(30px)';
    
    setTimeout(() => {
      if (current < questions.length - 1) {
        current++;
        showQuestion();
      } else {
        submitQuiz();
      }
    }, 300);
  }

  async function submitQuiz() {
    stopTimer();
    
    const totalTimeTaken = Math.round((Date.now() - startTime) / 1000);
    const username = localStorage.getItem('username') || "Guest";
    const topic = localStorage.getItem('topic');
    const subtopics = JSON.parse(localStorage.getItem('subtopics') || '[]');

    const res = await fetch('/evaluate_quiz', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        answers: answers, 
        questions: questions, 
        username: username, 
        topic: topic, 
        subtopics: subtopics,
        time_taken: totalTimeTaken,
        time_per_question: timePerQuestion
      })
    });

    const data = await res.json();
    localStorage.setItem('score', data.score);
    localStorage.setItem('questions', JSON.stringify(questions));
    localStorage.setItem('answers', JSON.stringify(answers));
    localStorage.setItem('explanations', JSON.stringify(data.explanations));
    localStorage.setItem('time_taken', totalTimeTaken);
    localStorage.setItem('average_time_per_question', data.average_time_per_question);

    window.location.href = 'review.html';
  }

  // Expose functions globally
  window.nextQuestion = nextQuestion;
</script>
</body>
</html>
