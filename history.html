<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>QUIZ++ | History Archive</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #040404;
      color: #eef2ff;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* Premium animated gradient background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 30% 20%, #1F1F1F 0%, #040404 90%);
      z-index: -2;
    }

    body::after {
      content: '';
      position: fixed;
      top: -15%;
      left: -5%;
      width: 70%;
      height: 70%;
      background: radial-gradient(circle, rgba(0, 200, 150, 0.12), transparent 75%);
      filter: blur(90px);
      z-index: -1;
      animation: auraFloat 14s infinite alternate ease-in-out;
    }

    @keyframes auraFloat {
      0% { opacity: 0.3; transform: translate(0, 0) scale(1); }
      100% { opacity: 0.8; transform: translate(8%, 6%) scale(1.25); }
    }

    /* Floating particles background */
    .particle-field {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #00C896;
      border-radius: 50%;
      opacity: 0.3;
      animation: floatParticle 18s infinite linear;
    }

    @keyframes floatParticle {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      15% { opacity: 0.6; }
      85% { opacity: 0.4; }
      100% { transform: translateY(-20vh) scale(0.8); opacity: 0; }
    }

    /* Cursor glow effect */
    .cursor-glow {
      position: fixed;
      width: 380px;
      height: 380px;
      background: radial-gradient(circle, rgba(0, 200, 150, 0.15), transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.08s linear;
      filter: blur(45px);
      will-change: transform;
    }

    .container {
      width: 90%;
      max-width: 1000px;
      margin: 2rem auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      z-index: 10;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin-bottom: 2rem;
      flex-wrap: wrap;
      gap: 1rem;
    }

    h2 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ffffff, #00C896, #a0f0e0);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      position: relative;
    }

    h2::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #00C896, #00ffcc, transparent);
      border-radius: 2px;
    }

    .controls {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      padding: 0.7rem 1.3rem;
      border: none;
      border-radius: 3rem;
      cursor: pointer;
      color: white;
      font-size: 0.85rem;
      font-weight: 700;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: linear-gradient(105deg, #1F1F1F, #0a0a0a);
      border: 1px solid rgba(0, 200, 150, 0.5);
      font-family: 'Inter', sans-serif;
    }

    button:hover {
      transform: translateY(-2px);
      border-color: #00ffcc;
      box-shadow: 0 8px 20px rgba(0, 200, 150, 0.3);
    }

    .primary-btn {
      background: linear-gradient(105deg, #1F1F1F, #0a0a0a);
    }

    .danger-btn {
      border-color: #ef4444;
    }

    .danger-btn:hover {
      border-color: #ff6b6b;
      box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3);
    }

    .success-btn {
      border-color: #00C896;
    }

    .login-btn {
      border-color: #f97316;
    }

    .login-btn:hover {
      border-color: #ff8c42;
      box-shadow: 0 8px 20px rgba(249, 115, 22, 0.3);
    }

    /* Filter controls */
    .filter-controls {
      display: flex;
      gap: 0.8rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
    }

    .filter-select, .time-filter {
      background: rgba(18, 18, 22, 0.8);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 200, 150, 0.3);
      border-radius: 3rem;
      padding: 0.6rem 1rem;
      color: #eef2ff;
      font-size: 0.85rem;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .filter-select:focus, .time-filter:focus {
      outline: none;
      border-color: #00C896;
      box-shadow: 0 0 0 2px rgba(0, 200, 150, 0.2);
    }

    /* Cards */
    .card {
      background: rgba(18, 18, 22, 0.75);
      backdrop-filter: blur(20px);
      padding: 1.5rem;
      margin: 1.2rem 0;
      border-radius: 2rem;
      border: 1px solid rgba(0, 200, 150, 0.25);
      box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.4);
      transition: all 0.3s ease;
      width: 100%;
    }

    .card:hover {
      border-color: rgba(0, 200, 150, 0.45);
      transform: translateY(-2px);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid rgba(0, 200, 150, 0.15);
      flex-wrap: wrap;
      gap: 1rem;
    }

    .score-badge {
      background: rgba(0, 200, 150, 0.15);
      padding: 0.4rem 1rem;
      border-radius: 3rem;
      font-weight: 700;
      font-size: 1rem;
      color: #8ef5e0;
      border: 1px solid rgba(0, 200, 150, 0.3);
    }

    .meta-info {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      font-size: 0.8rem;
      color: #a0b3c9;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .time-info {
      background: rgba(4, 4, 4, 0.5);
      padding: 0.7rem 1rem;
      border-radius: 1rem;
      margin-bottom: 1rem;
      border-left: 3px solid #00C896;
      font-size: 0.8rem;
    }

    .question {
      background: rgba(4, 4, 4, 0.4);
      padding: 1rem;
      margin: 0.8rem 0;
      border-radius: 1rem;
      border-left: 3px solid #00C896;
    }

    .question-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.8rem;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .question-text {
      font-weight: 500;
      line-height: 1.5;
      flex: 1;
      font-size: 0.9rem;
    }

    .answer-section {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      margin-top: 0.8rem;
      padding-top: 0.8rem;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .answer-item {
      flex: 1;
      min-width: 150px;
    }

    .answer-label {
      font-size: 0.7rem;
      color: #8e9aaf;
      margin-bottom: 0.2rem;
    }

    .correct {
      color: #8ef5e0;
      font-weight: 600;
    }

    .wrong {
      color: #ffbb8e;
      font-weight: 600;
    }

    .explanation {
      margin-top: 0.8rem;
      padding: 0.8rem;
      background: rgba(4, 4, 4, 0.5);
      border-radius: 0.8rem;
      border-left: 3px solid #f97316;
      font-size: 0.8rem;
      line-height: 1.5;
      color: #cbd5e6;
    }

    pre {
      background: rgba(4, 4, 4, 0.6);
      padding: 0.8rem;
      border-radius: 0.8rem;
      overflow-x: auto;
      margin: 0.5rem 0;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem;
      line-height: 1.4;
      white-space: pre-wrap;
      border: 0.5px solid rgba(0, 200, 150, 0.2);
    }

    .card-controls {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid rgba(0, 200, 150, 0.15);
      display: flex;
      justify-content: center;
    }

    .delete-card-btn {
      background: linear-gradient(105deg, #2a1a1a, #1a0f0f);
      border-color: #ef4444;
      padding: 0.5rem 1rem;
      font-size: 0.75rem;
    }

    .delete-card-btn:hover {
      border-color: #ff6b6b;
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 3rem 1.5rem;
      background: rgba(18, 18, 22, 0.6);
      backdrop-filter: blur(20px);
      border-radius: 2rem;
      border: 1px solid rgba(0, 200, 150, 0.2);
      width: 100%;
    }

    .empty-icon {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .loading {
      text-align: center;
      padding: 3rem;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(0, 200, 150, 0.2);
      border-top: 3px solid #00C896;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Modal styles */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(4, 4, 4, 0.85);
      backdrop-filter: blur(12px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      background: rgba(18, 18, 22, 0.95);
      padding: 2rem;
      border-radius: 2rem;
      border: 1px solid rgba(0, 200, 150, 0.3);
      max-width: 400px;
      width: 90%;
      text-align: center;
    }

    .modal h3 {
      margin-bottom: 1rem;
      font-size: 1.5rem;
    }

    .modal p {
      margin-bottom: 1.5rem;
      color: #a0b3c9;
    }

    .modal-buttons {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .notification {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      padding: 0.8rem 1.2rem;
      border-radius: 3rem;
      color: white;
      font-weight: 600;
      z-index: 1001;
      animation: slideIn 0.3s ease;
      background: #1F1F1F;
      border: 1px solid;
    }

    .notification.success {
      border-color: #00C896;
      background: rgba(0, 200, 150, 0.15);
      color: #8ef5e0;
    }

    .notification.error {
      border-color: #ef4444;
      background: rgba(239, 68, 68, 0.15);
      color: #ffbb8e;
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @media (max-width: 640px) {
      .container { padding: 0.5rem; margin: 1rem auto; }
      h2 { font-size: 1.8rem; }
      .card { padding: 1rem; }
      .meta-info { gap: 0.5rem; }
      .filter-controls { gap: 0.5rem; }
      .filter-select, .time-filter { font-size: 0.75rem; padding: 0.4rem 0.8rem; }
    }
  </style>
</head>
<body>
<div class="cursor-glow" id="cursorGlow"></div>
<div class="particle-field" id="particleField"></div>

<div id="clearModal" class="modal">
  <div class="modal-content">
    <h3>🗑️ clear all history</h3>
    <p>Are you sure you want to erase your entire quiz legacy? This action cannot be undone.</p>
    <div class="modal-buttons">
      <button class="danger-btn" onclick="confirmClearHistory()">clear all</button>
      <button class="primary-btn" onclick="closeModal()">cancel</button>
    </div>
  </div>
</div>

<div id="deleteQuizModal" class="modal">
  <div class="modal-content">
    <h3>🗑️ delete this quiz</h3>
    <p>This quiz record will be permanently removed.</p>
    <div class="modal-buttons">
      <button class="danger-btn" onclick="confirmDeleteQuiz()">delete</button>
      <button class="primary-btn" onclick="closeModal()">cancel</button>
    </div>
  </div>
</div>

<div class="container">
  <div class="header">
    <h2>✦ history archive ✦</h2>
    <div class="controls">
      <button class="primary-btn" onclick="window.location.href='topics.html'">📝 new quiz</button>
      <button class="success-btn" onclick="exportHistory()">📤 export</button>
      <button class="danger-btn" onclick="showClearModal()">🗑️ clear all</button>
      <button class="login-btn" onclick="goToLogin()">🔐 login</button>
    </div>
  </div>

  <div class="filter-controls">
    <select class="filter-select" id="topicFilter" onchange="filterHistory()">
      <option value="">all topics</option>
    </select>
    <select class="filter-select" id="scoreFilter" onchange="filterHistory()">
      <option value="">all scores</option>
      <option value="90-100">90-100%</option>
      <option value="70-89">70-89%</option>
      <option value="50-69">50-69%</option>
      <option value="0-49">0-49%</option>
    </select>
    <select class="filter-select" id="dateFilter" onchange="filterHistory()">
      <option value="">all time</option>
      <option value="today">today</option>
      <option value="week">this week</option>
      <option value="month">this month</option>
    </select>
    <select class="time-filter" id="timeFilter" onchange="filterHistory()">
      <option value="">any duration</option>
      <option value="fast">fast (under 2 min)</option>
      <option value="medium">medium (2-5 min)</option>
      <option value="slow">slow (over 5 min)</option>
    </select>
  </div>

  <div id="historyContainer">
    <div class="loading">
      <div class="loading-spinner"></div>
      <p>loading your cosmic archive...</p>
    </div>
  </div>
</div>

<script>
  // Cursor glow effect
  const cursorGlow = document.getElementById('cursorGlow');
  document.addEventListener('mousemove', (e) => {
    cursorGlow.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
  });

  // Generate floating particles
  function createParticles() {
    const container = document.getElementById('particleField');
    if (!container) return;
    for (let i = 0; i < 60; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      const size = Math.random() * 5 + 2;
      particle.style.width = `${size}px`;
      particle.style.height = `${size}px`;
      particle.style.left = `${Math.random() * 100}%`;
      particle.style.animationDuration = `${Math.random() * 20 + 10}s`;
      particle.style.animationDelay = `${Math.random() * 15}s`;
      particle.style.background = `#00C896`;
      particle.style.opacity = Math.random() * 0.5 + 0.2;
      container.appendChild(particle);
    }
  }
  createParticles();

  let allHistory = [];
  let currentDeleteIndex = null;

  async function loadHistory() {
    try {
      const username = localStorage.getItem('username');
      if (!username) {
        window.location.href = 'index.html';
        return;
      }

      const res = await fetch(`/get_history?username=${encodeURIComponent(username)}`);
      const data = await res.json();
      
      const container = document.getElementById('historyContainer');
      
      if (!data.success) {
        throw new Error(data.error || 'Failed to load history');
      }

      allHistory = data.history || [];
      allHistory = allHistory.filter((item, index, self) => 
        index === self.findIndex(t => t.timestamp === item.timestamp && t.topic === item.topic)
      );
      allHistory.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

      if (allHistory.length === 0) {
        showEmptyState();
        return;
      }

      populateTopicFilter();
      filterHistory();
      
    } catch (error) {
      console.error('Error loading history:', error);
      showErrorState();
      showNotification('error loading history', 'error');
    }
  }

  function populateTopicFilter() {
    const topicFilter = document.getElementById('topicFilter');
    while (topicFilter.children.length > 1) {
      topicFilter.removeChild(topicFilter.lastChild);
    }
    const topics = [...new Set(allHistory.map(item => item.topic).filter(Boolean))];
    topics.forEach(topic => {
      const option = document.createElement('option');
      option.value = topic;
      option.textContent = topic;
      topicFilter.appendChild(option);
    });
  }

  function filterHistory() {
    const topicFilter = document.getElementById('topicFilter').value;
    const scoreFilter = document.getElementById('scoreFilter').value;
    const dateFilter = document.getElementById('dateFilter').value;
    const timeFilter = document.getElementById('timeFilter').value;
    
    let filteredHistory = allHistory.filter(item => {
      if (topicFilter && item.topic !== topicFilter) return false;
      
      if (scoreFilter && item.score !== undefined) {
        const totalQuestions = item.questions ? item.questions.length : item.total || 1;
        const percentage = totalQuestions > 0 ? (item.score / totalQuestions) * 100 : 0;
        if (scoreFilter === '90-100' && percentage < 90) return false;
        if (scoreFilter === '70-89' && (percentage < 70 || percentage >= 90)) return false;
        if (scoreFilter === '50-69' && (percentage < 50 || percentage >= 70)) return false;
        if (scoreFilter === '0-49' && percentage >= 50) return false;
      }
      
      if (dateFilter) {
        const itemDate = new Date(item.timestamp);
        const now = new Date();
        if (dateFilter === 'today' && itemDate.toDateString() !== now.toDateString()) return false;
        if (dateFilter === 'week') {
          const weekAgo = new Date(now - 7 * 24 * 60 * 60 * 1000);
          if (itemDate < weekAgo) return false;
        }
        if (dateFilter === 'month') {
          const monthAgo = new Date(now - 30 * 24 * 60 * 60 * 1000);
          if (itemDate < monthAgo) return false;
        }
      }
      
      if (timeFilter && item.time_taken) {
        const seconds = item.time_taken;
        if (timeFilter === 'fast' && seconds > 120) return false;
        if (timeFilter === 'medium' && (seconds <= 120 || seconds > 300)) return false;
        if (timeFilter === 'slow' && seconds <= 300) return false;
      }
      
      return true;
    });
    
    displayHistory(filteredHistory);
  }

  function displayHistory(history) {
    const container = document.getElementById('historyContainer');
    container.innerHTML = '';

    if (history.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">🔍</div>
          <h3>no matching records</h3>
          <p>try adjusting your filters to explore more</p>
          <button class="primary-btn" onclick="clearFilters()">clear filters</button>
        </div>
      `;
      return;
    }

    history.forEach((historyItem, index) => {
      const card = createHistoryCard(historyItem, index);
      container.appendChild(card);
    });
  }

  function createHistoryCard(historyItem, index) {
    const card = document.createElement('div');
    card.className = 'card';
    
    const totalQuestions = historyItem.questions ? historyItem.questions.length : historyItem.total || 0;
    const score = historyItem.score !== null ? historyItem.score : "—";
    const timestamp = new Date(historyItem.timestamp).toLocaleString();
    const subtopics = Array.isArray(historyItem.subtopics) ? historyItem.subtopics.join(', ') : (historyItem.subtopic || 'general');
    const timeTaken = historyItem.time_taken || 0;
    const avgTime = historyItem.average_time_per_question || 0;
    const minutes = Math.floor(timeTaken / 60);
    const seconds = timeTaken % 60;
    
    card.innerHTML = `
      <div class="card-header">
        <div class="score-badge">${score}/${totalQuestions}</div>
        <div class="meta-info">
          <div class="meta-item">📚 ${escapeHtml(historyItem.topic || 'unknown')}</div>
          <div class="meta-item">📖 ${escapeHtml(subtopics)}</div>
          <div class="meta-item">🕒 ${timestamp}</div>
          ${timeTaken > 0 ? `<div class="meta-item">⏱️ ${minutes}m ${seconds}s</div>` : ''}
        </div>
      </div>
    `;
    
    if (timeTaken > 0) {
      const timeInfo = document.createElement('div');
      timeInfo.className = 'time-info';
      timeInfo.innerHTML = `<strong>⏱️ time analysis</strong><br>total: ${minutes}m ${seconds}s · avg: ${avgTime}s per question`;
      card.appendChild(timeInfo);
    }
    
    if (historyItem.questions && historyItem.questions.length > 0) {
      const questionsContainer = document.createElement('div');
      historyItem.questions.forEach((q, idx) => {
        const userAnswer = (historyItem.answers && historyItem.answers[idx]) ? historyItem.answers[idx] : "—";
        const correctAnswer = q.answer || "";
        const isCorrect = userAnswer.toUpperCase() === correctAnswer.toUpperCase();
        
        let questionText = q.question || 'no question text';
        if (questionText.includes("```")) {
          const parts = questionText.split("```");
          questionText = "";
          for (let j = 0; j < parts.length; j++) {
            if (j % 2 === 0) questionText += parts[j];
            else questionText += `<pre>${escapeHtml(parts[j])}</pre>`;
          }
        } else {
          questionText = escapeHtml(questionText);
        }
        
        const questionDiv = document.createElement('div');
        questionDiv.className = 'question';
        questionDiv.innerHTML = `
          <div class="question-header">
            <div class="question-text"><strong>Q${idx + 1}:</strong> ${questionText}</div>
            <span class="${isCorrect ? 'correct' : 'wrong'}">${isCorrect ? '✓ correct' : '✗ incorrect'}</span>
          </div>
          <div class="answer-section">
            <div class="answer-item">
              <div class="answer-label">your answer</div>
              <span class="${isCorrect ? 'correct' : 'wrong'}">${escapeHtml(userAnswer)}</span>
            </div>
            <div class="answer-item">
              <div class="answer-label">correct answer</div>
              <span class="correct">${escapeHtml(correctAnswer)}</span>
            </div>
          </div>
          ${q.explanation ? `<div class="explanation"><strong>💡 insight:</strong> ${escapeHtml(q.explanation)}</div>` : ''}
        `;
        questionsContainer.appendChild(questionDiv);
      });
      card.appendChild(questionsContainer);
    }
    
    const cardControls = document.createElement('div');
    cardControls.className = 'card-controls';
    cardControls.innerHTML = `<button class="delete-card-btn" onclick="showDeleteQuizModal(${index})">🗑️ delete this quiz</button>`;
    card.appendChild(cardControls);
    
    return card;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
  }

  function showDeleteQuizModal(index) {
    currentDeleteIndex = index;
    document.getElementById('deleteQuizModal').style.display = 'flex';
  }

  async function confirmDeleteQuiz() {
    if (currentDeleteIndex === null) return;
    try {
      const username = localStorage.getItem('username');
      const quizToDelete = allHistory[currentDeleteIndex];
      const response = await fetch('/delete_quiz', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username, timestamp: quizToDelete.timestamp })
      });
      const result = await response.json();
      if (response.ok && result.success) {
        allHistory.splice(currentDeleteIndex, 1);
        filterHistory();
        closeModal();
        showNotification('quiz deleted', 'success');
      } else {
        throw new Error(result.error || 'deletion failed');
      }
    } catch (error) {
      showNotification('error deleting quiz', 'error');
    }
  }

  function clearFilters() {
    document.getElementById('topicFilter').value = '';
    document.getElementById('scoreFilter').value = '';
    document.getElementById('dateFilter').value = '';
    document.getElementById('timeFilter').value = '';
    filterHistory();
  }

  function showClearModal() {
    document.getElementById('clearModal').style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('clearModal').style.display = 'none';
    document.getElementById('deleteQuizModal').style.display = 'none';
    currentDeleteIndex = null;
  }

  async function confirmClearHistory() {
    try {
      const username = localStorage.getItem('username');
      const response = await fetch('/clear_history', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: username })
      });
      const result = await response.json();
      if (response.ok && result.success) {
        closeModal();
        allHistory = [];
        showEmptyState();
        showNotification('history cleared', 'success');
      } else {
        throw new Error(result.error || 'clear failed');
      }
    } catch (error) {
      showNotification('error clearing history', 'error');
    }
  }

  function exportHistory() {
    if (allHistory.length === 0) {
      showNotification('no history to export', 'error');
      return;
    }
    const dataStr = JSON.stringify(allHistory, null, 2);
    const dataBlob = new Blob([dataStr], { type: 'application/json' });
    const url = URL.createObjectURL(dataBlob);
    const link = document.createElement('a');
    link.href = url;
    link.download = `nebula-history-${new Date().toISOString().split('T')[0]}.json`;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    URL.revokeObjectURL(url);
    showNotification('history exported', 'success');
  }

  function showNotification(message, type) {
    const notification = document.createElement('div');
    notification.className = `notification ${type}`;
    notification.textContent = message;
    document.body.appendChild(notification);
    setTimeout(() => notification.remove(), 3000);
  }

  function showEmptyState() {
    const container = document.getElementById('historyContainer');
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📜</div>
        <h3>no quiz history yet</h3>
        <p>embark on your first quiz to begin your archive</p>
        <button class="primary-btn" onclick="window.location.href='topics.html'">take a quiz</button>
        <button class="login-btn" onclick="goToLogin()" style="margin-top: 1rem;">go to login</button>
      </div>
    `;
  }

  function showErrorState() {
    const container = document.getElementById('historyContainer');
    container.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <h3>connection error</h3>
        <p>unable to load your history archive</p>
        <button class="primary-btn" onclick="loadHistory()">retry</button>
        <button class="login-btn" onclick="goToLogin()" style="margin-top: 1rem;">go to login</button>
      </div>
    `;
  }

  function goToLogin() {
    localStorage.removeItem('username');
    window.location.href = 'index.html';
  }

  document.addEventListener('DOMContentLoaded', loadHistory);
  window.onclick = function(event) {
    if (event.target.classList.contains('modal')) closeModal();
  };
</script>
</body>
</html>
