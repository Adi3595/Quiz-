<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>QUIZ++ | Results</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #040404;
      color: #eef2ff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      overflow-x: hidden;
      padding: 1.5rem;
    }

    /* Premium animated gradient background */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at 30% 20%, #1F1F1F 0%, #040404 90%);
      z-index: -2;
    }

    body::after {
      content: '';
      position: fixed;
      top: -15%;
      left: -5%;
      width: 70%;
      height: 70%;
      background: radial-gradient(circle, rgba(0, 200, 150, 0.12), transparent 75%);
      filter: blur(90px);
      z-index: -1;
      animation: auraFloat 14s infinite alternate ease-in-out;
    }

    @keyframes auraFloat {
      0% { opacity: 0.3; transform: translate(0, 0) scale(1); }
      100% { opacity: 0.8; transform: translate(8%, 6%) scale(1.25); }
    }

    /* Floating particles background */
    .particle-field {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      width: 3px;
      height: 3px;
      background: #00C896;
      border-radius: 50%;
      opacity: 0.3;
      animation: floatParticle 18s infinite linear;
    }

    @keyframes floatParticle {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      15% { opacity: 0.6; }
      85% { opacity: 0.4; }
      100% { transform: translateY(-20vh) scale(0.8); opacity: 0; }
    }

    /* Cursor glow effect */
    .cursor-glow {
      position: fixed;
      width: 380px;
      height: 380px;
      background: radial-gradient(circle, rgba(0, 200, 150, 0.15), transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%, -50%);
      transition: transform 0.08s linear;
      filter: blur(45px);
      will-change: transform;
    }

    .container {
      background: rgba(18, 18, 22, 0.8);
      backdrop-filter: blur(20px);
      padding: 2.5rem 2rem;
      border-radius: 2.5rem;
      text-align: center;
      width: 90%;
      max-width: 550px;
      border: 1px solid rgba(0, 200, 150, 0.28);
      box-shadow: 0 35px 60px -20px rgba(0, 0, 0, 0.7), inset 0 0 0 0.5px rgba(0, 200, 150, 0.12);
      position: relative;
      overflow: hidden;
      z-index: 20;
      animation: fadeSlideUp 0.6s ease-out;
    }

    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Premium edge shimmer */
    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #00C896, #9effe0, #00C896, transparent);
      border-radius: 2.5rem 2.5rem 0 0;
      animation: goldFlow 3.2s ease-in-out infinite;
    }

    @keyframes goldFlow {
      0% { opacity: 0.4; background-position: -100% 0; }
      50% { opacity: 1; background-position: 100% 0; }
      100% { opacity: 0.4; background-position: 200% 0; }
    }

    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ffffff, #00C896, #b3ffe8);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin-bottom: 0.5rem;
    }

    h2 {
      font-size: 1rem;
      font-weight: 500;
      color: #a0b3c9;
      margin-bottom: 1.5rem;
      letter-spacing: 0.3px;
    }

    .score {
      font-size: 3.5rem;
      font-weight: 800;
      margin: 1.5rem 0;
      padding: 1.5rem;
      border-radius: 2rem;
      background: rgba(4, 4, 4, 0.5);
      border: 2px solid;
      transition: all 0.3s ease;
    }

    .score small {
      font-size: 1.2rem;
      font-weight: 500;
      opacity: 0.8;
    }

    .time-info {
      margin: 1.2rem 0;
      padding: 1rem 1.2rem;
      background: rgba(4, 4, 4, 0.5);
      border-radius: 1.5rem;
      text-align: center;
      border: 1px solid rgba(0, 200, 150, 0.2);
    }

    .time-stats {
      font-size: 0.9rem;
      color: #cbd5e6;
      line-height: 1.6;
    }

    .emoji {
      font-size: 4rem;
      margin-bottom: 0.5rem;
      filter: drop-shadow(0 0 12px rgba(0, 200, 150, 0.4));
    }

    .message {
      font-size: 0.95rem;
      color: #a0b3c9;
      margin: 0.8rem 0;
      line-height: 1.5;
    }

    .button-container {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-top: 1.8rem;
    }

    button {
      padding: 0.9rem 1.5rem;
      background: linear-gradient(105deg, #1F1F1F, #0a0a0a);
      border: 1px solid rgba(0, 200, 150, 0.5);
      border-radius: 3rem;
      cursor: pointer;
      color: white;
      font-size: 0.9rem;
      font-weight: 700;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      position: relative;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    button::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 60%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(0, 200, 150, 0.15), transparent);
      transition: left 0.55s ease;
    }

    button:hover {
      transform: translateY(-2px);
      border-color: #00ffcc;
      box-shadow: 0 8px 20px rgba(0, 200, 150, 0.3);
    }

    button:hover::before {
      left: 120%;
    }

    button:active {
      transform: translateY(1px);
    }

    .secondary-btn {
      background: linear-gradient(105deg, #1F2522, #0f1512);
    }

    /* Responsive */
    @media (max-width: 560px) {
      body { padding: 1rem; }
      .container { padding: 1.8rem 1.2rem; }
      h1 { font-size: 1.8rem; }
      .score { font-size: 2.5rem; padding: 1rem; }
      .emoji { font-size: 3rem; }
    }
  </style>
</head>
<body>
<div class="cursor-glow" id="cursorGlow"></div>
<div class="particle-field" id="particleField"></div>

<div class="container">
  <div class="emoji" id="emoji">🎉</div>
  <h1>quiz completed</h1>
  <h2>your cosmic score</h2>
  <div id="score" class="score"></div>
  
  <!-- Time Information -->
  <div class="time-info">
    <div style="font-size: 0.85rem; color: #00C896; margin-bottom: 0.5rem; font-weight: 600;">
      ⏱️ time statistics
    </div>
    <div id="time-stats" class="time-stats">
      Loading time data...
    </div>
  </div>
  
  <div class="message" id="message"></div>
  <div class="button-container">
    <button onclick="goToTopics()">✨ try another quiz</button>
    <button class="secondary-btn" onclick="goToReview()">📖 review answers</button>
    <button onclick="viewHistory()">📊 view history</button>
  </div>
</div>

<script>
  // Cursor glow effect
  const cursorGlow = document.getElementById('cursorGlow');
  document.addEventListener('mousemove', (e) => {
    cursorGlow.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
  });

  // Generate floating particles
  function createParticles() {
    const container = document.getElementById('particleField');
    if (!container) return;
    for (let i = 0; i < 60; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      const size = Math.random() * 5 + 2;
      particle.style.width = `${size}px`;
      particle.style.height = `${size}px`;
      particle.style.left = `${Math.random() * 100}%`;
      particle.style.animationDuration = `${Math.random() * 20 + 10}s`;
      particle.style.animationDelay = `${Math.random() * 15}s`;
      particle.style.background = `#00C896`;
      particle.style.opacity = Math.random() * 0.5 + 0.2;
      container.appendChild(particle);
    }
  }
  createParticles();

  document.addEventListener('DOMContentLoaded', () => {
    const score = parseInt(localStorage.getItem('score')) || 0;
    const questions = JSON.parse(localStorage.getItem('questions') || '[]');
    const total = questions.length || 10;
    const percentage = total > 0 ? (score / total) * 100 : 0;
    const timeTaken = parseInt(localStorage.getItem('time_taken')) || 0;
    const avgTimePerQuestion = parseFloat(localStorage.getItem('average_time_per_question')) || 0;
    
    const scoreDiv = document.getElementById('score');
    const emoji = document.getElementById('emoji');
    const message = document.getElementById('message');
    
    // Set score color and message based on percentage
    let scoreColor, scoreMessage, scoreEmoji;
    
    if (percentage >= 90) {
      scoreColor = '#00C896';
      scoreMessage = '✨ outstanding! you mastered this realm ✨';
      scoreEmoji = '🏆';
    } else if (percentage >= 80) {
      scoreColor = '#2dd4bf';
      scoreMessage = '🌟 excellent work! you\'re on fire 🌟';
      scoreEmoji = '⭐';
    } else if (percentage >= 70) {
      scoreColor = '#84cc16';
      scoreMessage = '💪 good job! keep the momentum going 💪';
      scoreEmoji = '👍';
    } else if (percentage >= 60) {
      scoreColor = '#eab308';
      scoreMessage = '📚 solid effort! you\'re getting there 📚';
      scoreEmoji = '📖';
    } else if (percentage >= 50) {
      scoreColor = '#f59e0b';
      scoreMessage = '✅ you passed! review and level up ✅';
      scoreEmoji = '🔍';
    } else {
      scoreColor = '#f97316';
      scoreMessage = '🔄 don\'t give up! review and try again 🔄';
      scoreEmoji = '💫';
    }
    
    scoreDiv.style.borderColor = scoreColor;
    scoreDiv.style.color = scoreColor;
    scoreDiv.innerHTML = `${score}/${total}<br><small>${percentage.toFixed(1)}%</small>`;
    
    emoji.textContent = scoreEmoji;
    message.textContent = scoreMessage;
    
    // Update time statistics
    const timeStats = document.getElementById('time-stats');
    if (timeStats) {
      const minutes = Math.floor(timeTaken / 60);
      const seconds = timeTaken % 60;
      timeStats.innerHTML = `
        total time: ${minutes}m ${seconds}s<br>
        average per question: ${avgTimePerQuestion}s
      `;
    }
  });

  function goToTopics() {
    window.location.href = 'topics.html';
  }

  function goToReview() {
    window.location.href = 'review.html';
  }

  function viewHistory() {
    window.location.href = 'history.html';
  }
</script>
</body>
</html>
